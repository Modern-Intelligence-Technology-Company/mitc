[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord-mitc.pid

[program:mediamtx]
command=/usr/local/bin/mediamtx /tmp/mediamtx.yml
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:twin_feeds]
command=/bin/bash /app/scripts/twin_feeds.sh
autostart=true
autorestart=true
priority=20
startsecs=6
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:mitc_api]
command=/usr/bin/python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8080
directory=/app
autostart=true
autorestart=true
priority=30
startsecs=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
